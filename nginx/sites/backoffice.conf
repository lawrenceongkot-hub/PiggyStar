# ===== Admin Back Office (Vite static build) =====
# Domain: admin.piggybet.com

server {
    listen 80;
    server_name admin.piggybet.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.piggybet.com;

    # SSL
    ssl_certificate /etc/nginx/ssl/live/admin.piggybet.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/admin.piggybet.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Serve back office static files
    root /usr/share/nginx/html;
    index index.html;

    # API proxy from back office to the backend API server
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}